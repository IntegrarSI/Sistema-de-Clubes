<section id="inner-headline">
    <div class="container inner-heading">
        <div class="row">
            <div class="col-lg-12">
                <h2 class="noticiaTitulo">{{instancia.titulo}}</h2>
            </div>
        </div>
    </div>
</section>
</br>
<div class="container">
    <div class="row containerNoticia">
        <div class="col-md-2"></div>
        <div class="col-md-8">
        <p class="noticiaFecha">{{instancia.fecha | date: 'dd/MM/yyyy'}}</p>
        <h4 class="noticiaCopete">{{instancia.copete}}</h4>
        <div ng-if="instancia.fotoPeque != null">
            <img class="img-responsive" id="imgNoticia" src="/images/noticias/{{instancia.fotoPeque}}" />
        </div>
        <!--<p class="noticiaTexto">{{instancia.texto}}</p>-->
        <div class="noticiaTexto" ng-bind-html="instancia.texto"></div>
        <hr style="color: #68A4C4;" />
        <div ng-if="fbComments">
            <div class="fb-comments" fb-comment-box page-href="{{url}}Home/Index#/noticias_detalle/{{instancia.id}}" data-numposts="5" data-colorscheme="light" data-width="100%"></div>
        </div>
        </br>
        </div>
        <div class="col-md-2"></div>
    </div>
</div>


    <footer></footer>
